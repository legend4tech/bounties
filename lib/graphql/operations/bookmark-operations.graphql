query Bookmarks {
  bookmarks {
    id
    userId
    bountyId
    createdAt
    bounty {
      ...BountyFields
    }
  }
}

mutation ToggleBookmark($input: ToggleBookmarkInput!) {
  toggleBookmark(input: $input) {
    id
    userId
    bountyId
    createdAt
    bounty {
      ...BountyFields
    }
  }
}
